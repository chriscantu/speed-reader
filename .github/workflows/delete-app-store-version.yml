name: Delete App Store Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string to delete (e.g., 1.2.4)'
        required: true
        type: string
      platform:
        description: 'Platform'
        required: true
        type: choice
        default: 'IOS'
        options:
          - IOS
          - MAC_OS

jobs:
  delete:
    name: Delete unsubmitted version
    runs-on: macos-26
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Delete version
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          bundle exec fastlane delete_version \
            version:${{ github.event.inputs.version }} \
            platform:${{ github.event.inputs.platform }}
