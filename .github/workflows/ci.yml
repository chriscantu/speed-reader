name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: ESLint
        run: npx eslint .

      - name: Unit tests
        run: npm test

  swift-lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict

  swift-build-test:
    name: Swift Build & Test
    # Requires Xcode 26+ for iOS 26 / macOS 26 deployment targets.
    # Update runner when GitHub adds newer Xcode versions.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Build (macOS)
        run: |
          xcodebuild build \
            -project SpeedReader/SpeedReader.xcodeproj \
            -scheme SpeedReader \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Test (macOS)
        run: |
          xcodebuild test \
            -project SpeedReader/SpeedReader.xcodeproj \
            -scheme SpeedReader \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Build (iOS simulator)
        run: |
          xcodebuild build \
            -project SpeedReader/SpeedReader.xcodeproj \
            -scheme SpeedReader \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
