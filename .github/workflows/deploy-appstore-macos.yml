name: Deploy macOS to App Store

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g., v1.1.1)'
        required: true
        type: string

concurrency:
  group: deploy-appstore-macos
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Upload macOS to App Store
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Verify tag exists
        run: |
          if ! git describe --tags --exact-match HEAD 2>/dev/null; then
            echo "Error: '${{ github.event.inputs.version }}' is not a valid tag"
            exit 1
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Set up code signing
        env:
          SIGNING_CERTIFICATE_P12: ${{ secrets.SIGNING_CERTIFICATE_P12 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db

          echo -n "$SIGNING_CERTIFICATE_P12" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "ci" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "ci" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH \
            -P "$SIGNING_CERTIFICATE_PASSWORD" \
            -A -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "ci" $KEYCHAIN_PATH

          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          security default-keychain -s $KEYCHAIN_PATH

          echo "=== Signing identities ==="
          security find-identity -v -p codesigning
          echo "=== All identities ==="
          security find-identity -v

      - name: Build and upload macOS
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: bundle exec fastlane release_macos

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain $KEYCHAIN_PATH
          fi
