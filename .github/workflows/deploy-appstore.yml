name: Deploy to App Store

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g., v1.0.1)'
        required: true
        type: string

concurrency:
  group: deploy-appstore
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Upload to App Store
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Verify tag exists
        run: |
          if ! git describe --tags --exact-match HEAD 2>/dev/null; then
            echo "Error: '${{ github.event.inputs.version }}' is not a valid tag"
            exit 1
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Decode signing certificate
        env:
          SIGNING_CERTIFICATE_P12: ${{ secrets.SIGNING_CERTIFICATE_P12 }}
        run: |
          # Decode P12 to disk; Fastlane's import_certificate will import
          # it into the CI keychain that setup_ci creates.
          echo -n "$SIGNING_CERTIFICATE_P12" | base64 --decode -o $RUNNER_TEMP/certificate.p12

      - name: Build and upload to App Store
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: bundle exec fastlane release

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain $KEYCHAIN_PATH
          fi
